<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Student Chapter Analytics</title>
  <style>
    :root {
      --color-video: #d946ef; /* Pink/Magenta Video */
      --color-quiz: #10b981;  /* Green Quiz */
      --color-module: #f59e0b;/* Orange Module */
      --color-cct: #f97316;   /* Deep Orange CCT */
      --color-ct: #ef4444;    /* Red CT */
      --axis-color: #1f2937;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #fcfcfd;
      margin: 0;
      padding: 60px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .analytics-container {
      width: 100%;
      max-width: 1050px;
      background: #ffffff;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.02);
    }

    .header-block {
      margin-bottom: 40px;
    }
    .header-block h2 { margin: 0 0 6px 0; color: #111827; font-size: 1.5rem; font-weight: 700; }
    .header-block p { margin: 0; color: #6b7280; font-size: 0.95rem; }

    /* The Graph Workspace Grid */
    .graph-canvas {
      position: relative;
      width: 100%;
      height: 450px;
      margin-top: 20px;
      border-bottom: 2px solid var(--axis-color);
      border-left: 2px solid var(--axis-color);
    }

    /* Guideline Vectors (Hidden by Default) */
    .guideline-x, .guideline-y {
      position: absolute;
      z-index: 1;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .guideline-x {
      border-left: 1.5px dashed #9ca3af;
      bottom: 0;
    }

    /* Fixed to run LEFT toward the score axis */
    .guideline-y {
      border-top: 1.5px dashed #9ca3af;
      left: 0;
    }

    /* Plot Coordinates Root */
    .data-point-wrapper {
      position: absolute;
      /* Center alignment logic */
      transform: translate(-50%, 50%);
      bottom: var(--score-y);
      left: var(--date-x);
      z-index: 5;
    }

    /* Interactive Icon Wrapper Node */
    .icon-node {
      width: var(--node-size);
      height: var(--node-size);
      background: #ffffff;
      border: 2px solid var(--theme-color);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    /* Customized Non-Circular Shapes based on element class mapping */
    .shape-quiz { border-radius: 0; transform: rotate(45deg); width: calc(var(--node-size) * 0.85); height: calc(var(--node-size) * 0.85); }
    .shape-module { border-radius: 4px; }

    /* Elegant Camera Line Diagram Styling */
    .camera-svg {
      width: 60%;
      height: 60%;
      stroke: var(--color-video);
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Popover Info Blueprint Box */
    .hover-score-box {
      position: absolute;
      width: 220px;
      background: #ffffff;
      border: 1.5px solid #cbd5e1;
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.08);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      z-index: 10;
      left: calc(100% + 15px);
      top: 50%;
      transform: translateY(-50%) translateX(10px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
