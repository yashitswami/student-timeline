<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Chapter Analytics - Chandra Prakash</title>
  <style>
    :root {
      --color-video: #d946ef;
      --color-quiz: #10b981;
      --color-module: #f59e0b;
      --color-cct: #f97316;
      --color-ct: #ef4444;
      --axis-color: #1f2937;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #fcfcfd;
      margin: 0;
      padding: 60px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .analytics-container {
      width: 100%;
      max-width: 1050px;
      background: #ffffff;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.02);
    }

    .header-block {
      margin-bottom: 40px;
    }
    .header-block h2 { margin: 0 0 6px 0; color: #111827; font-size: 1.5rem; font-weight: 700; }
    .header-block p { margin: 0; color: #6b7280; font-size: 0.95rem; }

    .graph-canvas {
      position: relative;
      width: 100%;
      height: 450px;
      margin-top: 20px;
      border-bottom: 2px solid var(--axis-color);
      border-left: 2px solid var(--axis-color);
    }

    /* Dynamic Guideline Core System */
    .guideline-x, .guideline-y {
      position: absolute;
      z-index: 1;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    .guideline-x { border-left: 1.5px dashed #9ca3af; bottom: 0; }
    .guideline-y { border-top: 1.5px dashed #9ca3af; left: 0; }

    .data-point-wrapper {
      position: absolute;
      transform: translate(-50%, 50%);
      bottom: var(--score-y);
      left: var(--date-x);
      z-index: 5;
    }

    .icon-node {
      width: var(--node-size);
      height: var(--node-size);
      background: #ffffff;
      border: 2px solid var(--theme-color);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    /* Rotated triangle structural configuration for quizzes */
    .shape-quiz { border-radius: 0; transform: rotate(45deg); }
    .shape-quiz > * { transform: rotate(-45deg); }
    .shape-module { border-radius: 4px; }

    .hover-score-box {
      position: absolute;
      width: 240px;
      background: #ffffff;
      border: 1.5px solid #cbd5e1;
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.08);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      z-index: 10;
      left: calc(100% + 15px);
      top: 50%;
      transform: translateY(-50%) translateX(10px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .hover-score-box .node-title { font-size: 0.85rem; font-weight: 700; color: #111827; margin-bottom: 4px; }
    .hover-score-box .node-score { font-size: 0.8rem; color: #4b5563; line-height: 1.4; }

    .axis-date-tag {
      position: absolute;
      bottom: calc(-1 * var(--score-y) - 32px);
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      font-weight: 700;
      color: #9ca3af;
      white-space: nowrap;
      transition: color 0.15s ease, font-size 0.15s ease;
      pointer-events: none;
    }

    /* Interactive triggers */
    .data-point-wrapper:hover { z-index: 100; }
    .data-point-wrapper:hover .icon-node { transform: scale(1.2); background: var(--theme-color); }
    .data-point-wrapper:hover .icon-node span { color: #ffffff !important; }
    .data-point-wrapper:hover .hover-score-box { opacity: 1; visibility: visible; transform: translateY(-50%) translateX(0); }
    
    .data-point-wrapper:hover + .guideline-x,
    .data-point-wrapper:hover + .guideline-x + .guideline-y { opacity: 1; }
    .data-point-wrapper:hover .axis-date-tag { color: var(--theme-color); font-size: 0.85rem; }

    .y-axis-title {
      position: absolute;
      left: -50px;
      top: 50%;
      transform: rotate(-90deg) translateY(-50%);
      font-size: 0.85rem;
      font-weight: 600;
      color: #6b7280;
      letter-spacing: 0.05em;
    }

    .chapter-elements-legend { margin-top: 60px; border-top: 1px solid #f1f5f9; padding-top: 24px; }
    .legend-title { font-size: 0.85rem; font-weight: 700; color: #4b5563; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.05em; }
    .legend-flex { display: flex; gap: 32px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: #374151; font-weight: 500; }

    .sym-quiz { width: 10px; height: 10px; border: 2px solid var(--color-quiz); transform: rotate(45deg); }
    .sym-cct { width: 10px; height: 10px; border: 2px solid var(--color-cct); border-radius: 50%; }
    .sym-ct { width: 10px; height: 10px; border: 2px solid var(--color-ct); border-radius: 50%; background: var(--color-ct); }
  </style>
</head>
<body>

  <div class="analytics-container">
    <div class="header-block">
      <h2>Chapter Performance Journey Map &bull; Units and Measurements</h2>
      <p>Student Performance Footprint Matrix &bull; <strong>Chandra Prakash Suthar</strong></p>
    </div>

    <div style="position: relative; width: 100%;">
      <div class="y-axis-title">Percentage Score</div>
      <div class="graph-canvas" id="canvas-container">
        </div>
    </div>

    <div class="chapter-elements-legend">
      <div class="legend-title">Various Elements of a Chapter</div>
      <div class="legend-flex">
        <div class="legend-item"><span class="sym-quiz"></span> Quiz</div>
        <div class="legend-item"><span class="sym-cct"></span> CCT</div>
        <div class="legend-item"><span class="sym-ct"></span> CT (Chapter Test)</div>
      </div>
    </div>
  </div>

  <script>
    // Exact structural chronological history decoded from Chandra Prakash's PDF report
    const chandraChapterData = [
      { date: "27 May", label: "Live Quiz Sessions 1 & 2", type: "quiz", scoreY: 68, size: 30, scoreText: "Session 1: 5/6 (83%)<br>Session 2: 4/8 (50%)", colorVar: "var(--color-quiz)", shapeClass: "shape-quiz", innerHtml: "<span></span>" },
      { date: "02 Jun", label: "Live Quiz Sessions 4 & 5", type: "quiz", scoreY: 78, size: 32, scoreText: "Session 4: 4/4 (100%)<br>Session 5: 3/5 (60%)", colorVar: "var(--color-quiz)", shapeClass: "shape-quiz", innerHtml: "<span></span>" },
      { date: "03 Jun", label: "Units Video End Quiz", type: "quiz", scoreY: 8.3, size: 24, scoreText: "Score: 4.00/48.00 (8.3%)<br>Status: Consumed", colorVar: "var(--color-quiz)", shapeClass: "shape-quiz", innerHtml: "<span></span>" },
      { date: "11 Jun", label: "Live Quiz Sessions 6 & 7", type: "quiz", scoreY: 50, size: 28, scoreText: "Session 6: 1/2 (50%)<br>Session 7: 0/0", colorVar: "var(--color-quiz)", shapeClass: "shape-quiz", innerHtml: "<span></span>" },
      { date: "13 Jun", label: "CCT 01: Units & Dimensions", type: "cct", scoreY: 15.3, size: 24, scoreText: "Score: 2.00/13.00 (15.3%)<br>Status: Evaluation Complete", colorVar: "var(--color-cct)", shapeClass: "", innerHtml: "<span style='color: var(--color-cct); font-weight: bold;'>○</span>" },
      { date: "13 Jun", label: "CCT 02: Significant Figures", type: "cct", scoreY: 33.3, size: 26, scoreText: "Score: 3.00/9.00 (33.3%)<br>Status: Evaluation Complete", colorVar: "var(--color-cct)", shapeClass: "", innerHtml: "<span style='color: var(--color-cct); font-weight: bold;'>○</span>" },
      { date: "14 Jun", label: "Live Quiz Session 8", type: "quiz", scoreY: 50, size: 28, scoreText: "Score: 1/2 (50%)<br>Status: Evaluated", colorVar: "var(--color-quiz)", shapeClass: "shape-quiz", innerHtml: "<span></span>" },
      { date: "17 Jun", label: "Chapter Milestone Evaluations", type: "ct", scoreY: 5.1, size: 24, scoreText: "Level 1 Test: 3/58 (5.1%)<br>Level 2 Test: -3/24 (Negative)", colorVar: "var(--color-ct)", shapeClass: "", innerHtml: "<span style='color: #fff; font-size: 0.8rem; line-height:0;'>●</span>" }
    ];

    // Perfect structural alignment configuration maps identical dates to identical track vertical lines
    const timelineTimelineMap = {
      "27 May": 10,
      "02 Jun": 24,
      "03 Jun": 38,
      "11 Jun": 52,
      "13 Jun": 66, // Maps CCT 01 and CCT 02 perfectly to the exact same vertical gridline
      "14 Jun": 80,
      "17 Jun": 94
    };

    const canvas = document.getElementById('canvas-container');

    chandraChapterData.forEach((node) => {
      const xCoordPct = timelineTimelineMap[node.date]; 
      
      const nodeWrapper = document.createElement('div');
      nodeWrapper.className = 'data-point-wrapper';
      nodeWrapper.style.setProperty('--date-x', `${xCoordPct}%`);
      nodeWrapper.style.setProperty('--score-y', `${node.scoreY}%`);
      nodeWrapper.style.setProperty('--node-size', `${node.size}px`);
      nodeWrapper.style.setProperty('--theme-color', node.colorVar);

      nodeWrapper.innerHTML = `
        <div class="icon-node ${node.shapeClass}">
          ${node.innerHtml}
        </div>
        <div class="axis-date-tag">${node.date}</div>
        <div class="hover-score-box">
          <div style="font-size: 0.72rem; color: ${node.colorVar}; font-weight:700; text-transform:uppercase; margin-bottom:4px;">${node.type}</div>
          <div class="node-title">${node.label}</div>
          <div class="node-score">${node.scoreText}</div>
        </div>
      `;

      const guidelineX = document.createElement('div');
      guidelineX.className = 'guideline-x';
      guidelineX.style.left = `${xCoordPct}%`;
      guidelineX.style.height = `${node.scoreY}%`;

      const guidelineY = document.createElement('div');
      guidelineY.className = 'guideline-y';
      guidelineY.style.bottom = `${node.scoreY}%`;
      guidelineY.style.left = '0';
      guidelineY.style.width = `${xCoordPct}%`;

      canvas.appendChild(nodeWrapper);
      canvas.appendChild(guidelineX);
      canvas.appendChild(guidelineY);
    });
  </script>
</body>
</html>
