<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Chapter Analytics - Functions</title>
  <style>
    :root {
      --color-video: #d946ef;
      --color-quiz: #10b981;
      --color-module: #f59e0b;
      --color-cct: #f97316;
      --color-ct: #ef4444;
      --axis-color: #1f2937;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #fcfcfd;
      margin: 0;
      padding: 60px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .analytics-container {
      width: 100%;
      max-width: 1050px;
      background: #ffffff;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.02);
    }

    .header-block {
      margin-bottom: 40px;
    }
    .header-block h2 { margin: 0 0 6px 0; color: #111827; font-size: 1.5rem; font-weight: 700; }
    .header-block p { margin: 0; color: #6b7280; font-size: 0.95rem; }

    .graph-canvas {
      position: relative;
      width: 100%;
      height: 450px;
      margin-top: 20px;
      border-bottom: 2px solid var(--axis-color);
      border-left: 2px solid var(--axis-color);
    }

    /* Dynamic Guidelines overlay layers */
    .guideline-x, .guideline-y {
      position: absolute;
      z-index: 1;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    .guideline-x { border-left: 1.5px dashed #9ca3af; bottom: 0; }
    .guideline-y { border-top: 1.5px dashed #9ca3af; left: 0; }

    .data-point-wrapper {
      position: absolute;
      transform: translate(-50%, 50%);
      bottom: var(--score-y);
      left: var(--date-x);
      z-index: 5;
    }

    .icon-node {
      width: var(--node-size);
      height: var(--node-size);
      background: #ffffff;
      border: 2px solid var(--theme-color);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    /* Shape shifts based on properties */
    .shape-quiz { border-radius: 0; transform: rotate(45deg); }
    .shape-module { border-radius: 4px; }
    
    /* Avoid rotating inside elements if wrapper shape changes */
    .shape-quiz > * { transform: rotate(-45deg); }

    .camera-svg {
      width: 60%;
      height: 60%;
      stroke: var(--theme-color);
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .hover-score-box {
      position: absolute;
      width: 230px;
      background: #ffffff;
      border: 1.5px solid #cbd5e1;
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.08);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      z-index: 10;
      left: calc(100% + 15px);
      top: 50%;
      transform: translateY(-50%) translateX(10px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .hover-score-box .node-title { font-size: 0.85rem; font-weight: 700; color: #111827; margin-bottom: 4px; }
    .hover-score-box .node-score { font-size: 0.8rem; color: #4b5563; }

    .axis-date-tag {
      position: absolute;
      bottom: calc(-1 * var(--score-y) - 32px);
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      font-weight: 700;
      color: #9ca3af;
      white-space: nowrap;
      transition: color 0.15s ease, font-size 0.15s ease;
      pointer-events: none;
    }

    /* Master hover state triggers */
    .data-point-wrapper:hover { z-index: 100; }
    .data-point-wrapper:hover .icon-node { transform: scale(1.2); background: var(--theme-color); }
    .data-point-wrapper:hover .camera-svg { stroke: #ffffff; }
    .data-point-wrapper:hover .icon-node span { color: #ffffff !important; }
    .data-point-wrapper:hover .hover-score-box { opacity: 1; visibility: visible; transform: translateY(-50%) translateX(0); }
    
    .data-point-wrapper:hover + .guideline-x,
    .data-point-wrapper:hover + .guideline-x + .guideline-y { opacity: 1; }
    .data-point-wrapper:hover .axis-date-tag { color: var(--theme-color); font-size: 0.85rem; }

    .y-axis-title {
      position: absolute;
      left: -50px;
      top: 50%;
      transform: rotate(-90deg) translateY(-50%);
      font-size: 0.85rem;
      font-weight: 600;
      color: #6b7280;
      letter-spacing: 0.05em;
    }

    .chapter-elements-legend { margin-top: 60px; border-top: 1px solid #f1f5f9; padding-top: 24px; }
    .legend-title { font-size: 0.85rem; font-weight: 700; color: #4b5563; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.05em; }
    .legend-flex { display: flex; gap: 32px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: #374151; font-weight: 500; }

    .sym-video { width: 16px; height: 16px; stroke: var(--color-video); stroke-width: 2; fill: none; }
    .sym-quiz { width: 10px; height: 10px; border: 2px solid var(--color-quiz); transform: rotate(45deg); }
    .sym-module { width: 10px; height: 10px; border: 2px solid var(--color-module); border-radius: 2px; }
    .sym-cct { width: 10px; height: 10px; border: 2px solid var(--color-cct); border-radius: 50%; }
  </style>
</head>
<body>

  <div class="analytics-container">
    <div class="header-block">
      <h2>Chapter Performance Journey Map &bull; Functions</h2>
      <p>Student Performance Footprint Matrix &bull; <strong id="student-name-display">Advaith V</strong></p>
    </div>

    <div style="position: relative; width: 100%;">
      <div class="y-axis-title">Percentage Score</div>
      <div class="graph-canvas" id="canvas-container">
        </div>
    </div>

    <div class="chapter-elements-legend">
      <div class="legend-title">Various Elements of a Chapter</div>
      <div class="legend-flex">
        <div class="legend-item">
          <svg class="sym-video" viewBox="0 0 24 24"><path d="M23 7l-7 5 7 5V7z"></path><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
          Video
        </div>
        <div class="legend-item"><span class="sym-quiz"></span> Quiz</div>
        <div class="legend-item"><span class="sym-module"></span> Module</div>
        <div class="legend-item"><span class="sym-cct"></span> CCT</div>
      </div>
    </div>
  </div>

  <script>
    // Parsed Student Submission array extracted directly from Functions.csv
    const functionChapterData = [
      { date: "14 Apr", label: "Module - Functions", type: "module", scoreY: 15, size: 24, scoreText: "Status: FINISHED / Opened", colorVar: "var(--color-module)", shapeClass: "shape-module", innerHtml: "" },
      { date: "22 Apr", label: "In-Class Quiz - Functions", type: "quiz", scoreY: 75, size: 30, scoreText: "Score: 18/24 (75%)", colorVar: "var(--color-quiz)", shapeClass: "shape-quiz", innerHtml: "<span></span>" },
      { date: "25 Apr", label: "CCT 01: Domain & Basic Types", type: "cct", scoreY: 100, size: 38, scoreText: "Score: 21/21 (100%)", colorVar: "var(--color-cct)", shapeClass: "", innerHtml: "<span style='color: var(--color-cct); font-weight: bold;'>○</span>" },
      { date: "25 Apr", label: "CCT 02: Modulus & Signum", type: "cct", scoreY: 100, size: 38, scoreText: "Score: 6/6 (100%)", colorVar: "var(--color-cct)", shapeClass: "", innerHtml: "<span style='color: var(--color-cct); font-weight: bold;'>○</span>" },
      { date: "03 Jun", label: "CCT 03: GIF, Exp & Logarithms", type: "cct", scoreY: 100, size: 38, scoreText: "Score: 12/12 (100%)", colorVar: "var(--color-cct)", shapeClass: "", innerHtml: "<span style='color: var(--color-cct); font-weight: bold;'>○</span>" },
      { date: "03 Jun", label: "CCT 04: Range & Algebra", type: "cct", scoreY: 100, size: 38, scoreText: "Score: 19/19 (100%)", colorVar: "var(--color-cct)", shapeClass: "", innerHtml: "<span style='color: var(--color-cct); font-weight: bold;'>○</span>" },
      { 
        date: "06 Jun", 
        label: "Vid: Exponential & Logarithms", 
        type: "video", 
        scoreY: 20, 
        size: 24, 
        scoreText: "Engagement Tracked", 
        colorVar: "var(--color-video)", 
        shapeClass: "", 
        innerHtml: `<svg class="camera-svg" viewBox="0 0 24 24"><path d="M23 7l-7 5 7 5V7z"></path><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>` 
      }
    ];

    const canvas = document.getElementById('canvas-container');

    // Chronologically spaces the 7 elements out nicely across the horizontal container canvas width (10% to 90%)
    functionChapterData.forEach((node, index) => {
      const stepPct = 12 + (index * 12.5); 
      
      // Create HTML node block elements dynamically
      const nodeWrapper = document.createElement('div');
      nodeWrapper.className = 'data-point-wrapper';
      nodeWrapper.style.setProperty('--date-x', `${stepPct}%`);
      nodeWrapper.style.setProperty('--score-y', `${node.scoreY}%`);
      nodeWrapper.style.setProperty('--node-size', `${node.size}px`);
      nodeWrapper.style.setProperty('--theme-color', node.colorVar);

      nodeWrapper.innerHTML = `
        <div class="icon-node ${node.shapeClass}">
          ${node.innerHtml}
        </div>
        <div class="axis-date-tag">${node.date}</div>
        <div class="hover-score-box">
          <div style="font-size: 0.72rem; color: ${node.colorVar}; font-weight:700; text-transform:uppercase; margin-bottom:2px;">${node.type}</div>
          <div class="node-title">${node.label}</div>
          <div class="node-score">${node.scoreText}</div>
        </div>
      `;

      const guidelineX = document.createElement('div');
      guidelineX.className = 'guideline-x';
      guidelineX.style.left = `${stepPct}%`;
      guidelineX.style.height = `${node.scoreY}%`;

      const guidelineY = document.createElement('div');
      guidelineY.className = 'guideline-y';
      guidelineY.style.bottom = `${node.scoreY}%`;
      guidelineY.style.left = '0';
      guidelineY.style.width = `${stepPct}%`;

      // Mount elements safely into the DOM
      canvas.appendChild(nodeWrapper);
      canvas.appendChild(guidelineX);
      canvas.appendChild(guidelineY);
    });
  </script>
</body>
</html>
